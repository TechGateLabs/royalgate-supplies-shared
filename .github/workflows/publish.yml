name: Publish to GitHub Packages

# Publish on every push to main that bumps the version, plus on manual
# release creation. The job is idempotent — npm refuses to publish a
# version that already exists, so accidental re-runs are no-ops.
on:
  push:
    branches: [main]
    paths:
      - "package.json"
      - "src/**"
      - "tsconfig.json"
      - ".github/workflows/publish.yml"
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://npm.pkg.github.com"
          scope: "@techgatelabs"
      - name: Install
        run: npm install --no-audit --no-fund
      - name: Build
        run: npm run build
      - name: Publish (skip if version already published)
        run: |
          PKG=$(node -p "require('./package.json').name")
          VER=$(node -p "require('./package.json').version")
          if npm view "$PKG@$VER" version --registry=https://npm.pkg.github.com 2>/dev/null; then
            echo "::notice::$PKG@$VER already published — skipping."
            exit 0
          fi
          npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
